<!doctype html>
<html lang="en" data-theme="dim">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>opencode-bench</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  /* Heatmap matrix — custom on purpose: score-colored cells + sticky task column */
  .matrix-scroll { overflow-x: auto; }
  table.matrix { border-collapse: separate; border-spacing: 0; width: 100%; }
  .matrix th, .matrix td { border: 1px solid color-mix(in oklab, currentColor 12%, transparent);
    border-width: 0 1px 1px 0; padding: .45rem .6rem; text-align: center;
    min-width: 6.5rem; font-variant-numeric: tabular-nums; }
  .matrix tr:first-child th { border-top-width: 1px; }
  .matrix th.task, .matrix td.task { border-left-width: 1px; }
  .matrix th { font-weight: 600; font-size: .78rem; }
  .matrix th.task, .matrix td.task { text-align: left; position: sticky; left: 0;
    z-index: 1; min-width: 11rem; max-width: 14rem; font-size: .8rem;
    background: var(--color-base-200); }
  .cell { cursor: pointer; }
  .cell:hover { outline: 2px solid var(--color-primary); outline-offset: -2px; }
  .cell .eps { display: block; opacity: .65; font-size: .68rem; }
  pre.diff { max-height: 420px; overflow: auto; font-size: .72rem; padding: .6rem;
    border-radius: .5rem; background: var(--color-base-300); margin: 0; }
</style>
</head>
<body class="bg-base-100 min-h-screen">

<div class="navbar bg-base-200 border-b border-base-300 px-4 lg:px-6 sticky top-0 z-20">
  <div class="flex-1 flex items-baseline gap-3">
    <span class="text-lg font-bold">opencode-bench</span>
    <span class="text-sm opacity-60 hidden sm:inline">agents vs production commits, judged by a model panel</span>
  </div>
  <div class="flex-none text-sm opacity-70 tabular-nums" id="spend"></div>
</div>

<main class="p-4 lg:p-6 grid gap-4 lg:gap-6 lg:grid-cols-[400px_minmax(0,1fr)] max-w-[1700px] mx-auto">

  <!-- left: launcher + runs -->
  <div class="flex flex-col gap-4 lg:gap-6">
    <div class="card bg-base-200 shadow-sm">
      <div class="card-body gap-4">
        <h2 class="card-title text-base">New run</h2>
        <label class="form-control w-full">
          <div class="label pb-1"><span class="label-text opacity-70">Models — one per line, provider/model</span></div>
          <textarea id="models" rows="5" class="textarea textarea-bordered font-mono text-xs leading-5 w-full"></textarea>
        </label>
        <div>
          <div class="label pb-1"><span class="label-text opacity-70">Tasks</span></div>
          <div id="tasks" class="flex flex-col gap-1 max-h-56 overflow-y-auto pr-1"></div>
        </div>
        <div class="flex items-end gap-3">
          <label class="form-control w-28">
            <div class="label pb-1"><span class="label-text opacity-70">Episodes</span></div>
            <input type="number" id="episodes" value="3" min="1" max="10" class="input input-bordered input-sm w-full">
          </label>
          <button id="launch" class="btn btn-primary btn-sm flex-1">Launch run</button>
        </div>
      </div>
    </div>

    <div class="card bg-base-200 shadow-sm" id="runs-panel" style="display:none">
      <div class="card-body gap-3">
        <h2 class="card-title text-base">Runs</h2>
        <div id="runs" class="flex flex-col gap-4"></div>
      </div>
    </div>
  </div>

  <!-- right: results + detail -->
  <div class="flex flex-col gap-4 lg:gap-6 min-w-0">
    <div class="card bg-base-200 shadow-sm">
      <div class="card-body gap-3">
        <div class="flex items-baseline justify-between flex-wrap gap-2">
          <h2 class="card-title text-base">Results</h2>
          <span class="text-xs opacity-60">mean score as % of task max · click a cell for judge checklists &amp; diffs · live</span>
        </div>
        <div class="matrix-scroll"><table class="matrix" id="matrix"></table></div>
      </div>
    </div>

    <div class="card bg-base-200 shadow-sm" id="detail-card" style="display:none">
      <div class="card-body gap-2" id="detail"></div>
    </div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let TASKS = [], RESULTS = [];

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ---- launcher ----
async function initLauncher() {
  TASKS = await api("/api/tasks");
  $("tasks").innerHTML = TASKS.map(t =>
    `<label class="label cursor-pointer justify-start gap-2 py-0.5">
       <input type="checkbox" value="${t.name}" checked class="checkbox checkbox-xs checkbox-primary">
       <span class="label-text text-xs">${t.name}</span>
       <span class="text-[.65rem] opacity-50">${t.repo}</span>
     </label>`).join("");
  const models = await api("/api/models");
  $("models").value = models.join("\n");
}

$("launch").onclick = async () => {
  const models = $("models").value.split("\n").map(s => s.trim()).filter(Boolean);
  const tasks = [...$("tasks").querySelectorAll("input:checked")].map(i => i.value);
  const episodes = Number($("episodes").value) || 3;
  $("launch").disabled = true;
  try {
    await api("/api/runs", { method: "POST",
      headers: {"content-type": "application/json"},
      body: JSON.stringify({ models, tasks, episodes }) });
    await refreshRuns();
  } catch (e) { alert(e.message); }
  $("launch").disabled = false;
};

// ---- runs ----
const STATUS_BADGE = {
  running: "badge-info", pending: "badge-ghost", done: "badge-success",
  failed: "badge-error", stopped: "badge-warning",
};

async function refreshRuns() {
  const runs = await api("/api/runs");
  $("runs-panel").style.display = runs.length ? "" : "none";
  $("runs").innerHTML = runs.map(run => {
    const active = run.shards.some(s => s.status === "running" || s.status === "pending");
    const shards = run.shards.map(s => {
      const pct = s.total ? Math.round(100 * s.done / s.total) : 0;
      return `<div class="flex items-center gap-2 text-xs">
        <span class="w-44 truncate font-mono" title="${esc(s.model)}">${esc(s.model.replace("openrouter/",""))}</span>
        <progress class="progress progress-primary flex-1" value="${s.done}" max="${s.total}"></progress>
        <span class="tabular-nums w-10 text-right">${s.done}/${s.total}</span>
        <span class="badge badge-xs ${STATUS_BADGE[s.status] ?? "badge-ghost"}">${s.status}</span>
      </div>
      ${s.status === "running" && s.logTail ? `<div class="text-[.65rem] opacity-50 font-mono pl-1 truncate">${esc(s.logTail.split("\n").pop())}</div>` : ""}`;
    }).join("");
    return `<div class="flex flex-col gap-1.5">
      <div class="flex items-center gap-2 text-sm">
        <span class="font-semibold">${run.id}</span>
        <span class="opacity-60 text-xs">${run.tasks.length} tasks × ${run.episodes} ep · ${new Date(run.startedAt).toLocaleTimeString()}</span>
        ${active ? `<button class="btn btn-outline btn-error btn-xs ml-auto" onclick="stopRun('${run.id}')">stop</button>` : ""}
      </div>${shards}</div>`;
  }).join("<div class='divider my-0'></div>");
}

window.stopRun = async (id) => { await api(`/api/runs/${id}/stop`, {method:"POST"}); refreshRuns(); };

// ---- results matrix ----
function taskMax(name) {
  const t = TASKS.find(t => t.name === name);
  return t ? t.maxScore : 1;
}

async function refreshResults() {
  RESULTS = await api("/api/results");
  const models = [...new Set(RESULTS.map(r => r.model))];
  const tasks = [...new Set(RESULTS.map(r => r.task))].sort();
  const cell = (m, t) => RESULTS.filter(r => r.model === m && r.task === t);
  const pct = (m, t) => {
    const rs = cell(m, t);
    if (!rs.length) return null;
    return rs.reduce((s, r) => s + r.score.final, 0) / rs.length / taskMax(t);
  };
  const color = (p) => p == null ? "transparent" : `hsl(${Math.round(p*120)} 55% 22%)`;
  const avg = (m) => {
    const ps = tasks.map(t => pct(m, t)).filter(p => p != null);
    return ps.length ? ps.reduce((a,b) => a+b, 0) / ps.length : 0;
  };
  models.sort((a, b) => avg(b) - avg(a));

  let html = "<tr><th class='task'>task</th>" + models.map(m =>
    `<th>${esc(m.replace("openrouter/", ""))}</th>`).join("") + "</tr>";
  html += tasks.map(t => "<tr><td class='task'>" + esc(t) + "</td>" + models.map(m => {
    const p = pct(m, t), rs = cell(m, t);
    if (p == null) return "<td>–</td>";
    const cost = rs.reduce((s, r) => s + (r.usage?.cost ?? 0), 0);
    return `<td class="cell" style="background:${color(p)}"
      onclick="showDetail('${esc(m)}','${esc(t)}')">${(p*100).toFixed(0)}%
      <span class="eps">${rs.length} ep · $${cost.toFixed(2)}</span></td>`;
  }).join("") + "</tr>").join("");
  html += "<tr><td class='task font-semibold'>model average</td>" + models.map(m =>
    `<td style="background:${color(avg(m))}"><b>${(avg(m)*100).toFixed(0)}%</b></td>`).join("") + "</tr>";
  $("matrix").innerHTML = html;
}

// ---- detail ----
window.showDetail = async (model, task) => {
  const rows = await api(`/api/cell?model=${encodeURIComponent(model)}&task=${encodeURIComponent(task)}`);
  let refDiff = "";
  try { refDiff = await (await fetch(`/api/reference-diff/${task}`)).text(); } catch {}
  $("detail-card").style.display = "";
  const el = $("detail");
  el.innerHTML = `<h2 class="card-title text-base">${esc(task)} <span class="opacity-60 font-normal">· ${esc(model)}</span></h2>` +
  rows.map((r, i) => {
    const crits = r.scoreDetails.map((s, si) => {
      const judges = s.judges.map((j, ji) =>
        `<button class="badge badge-outline ${j.score >= 0.5 ? "badge-success" : "badge-error"} cursor-pointer"
          onclick="toggleRat(${i},${si},${ji})">${esc(j.judge.split("/").pop())} ${j.score.toFixed(2)}</button>`
      ).join(" ");
      const rats = s.judges.map((j, ji) => {
        const items = (j.checklist || []).map(c =>
          `<div>${c.satisfied ? "✓" : "✗"} ${esc(c.item)}</div>`).join("");
        return `<div id="rat-${i}-${si}-${ji}" style="display:none"
          class="text-xs opacity-80 border-l-2 border-primary pl-3 py-2 my-1 ml-2 whitespace-pre-wrap bg-base-300 rounded-r">
          <b>${esc(j.judge)}:</b> ${esc(j.rationale || "(no rationale)")}
          ${items ? `<div class="mt-2 opacity-90">${items}</div>` : ""}</div>`;
      }).join("");
      return `<div class="mt-2 ml-1">
        <div class="flex flex-wrap items-baseline gap-2 text-sm">
          <span class="w-44 text-xs opacity-70">${esc(s.criterion)} (w ${s.weight})</span>${judges}
          ${s.variance > 0.02 ? `<span class="badge badge-warning badge-outline badge-sm">disagreement</span>` : ""}
        </div>${rats}</div>`;
    }).join("");
    const diffs = `<details class="mt-3">
      <summary class="cursor-pointer text-sm link link-primary no-underline">agent diff vs production diff</summary>
      <div class="grid md:grid-cols-2 gap-3 mt-2">
        <div><div class="text-xs opacity-60 mb-1">agent</div>
          <pre class="diff">${esc(r.diff || "(empty submission)")}</pre></div>
        <div><div class="text-xs opacity-60 mb-1">production (reference)</div>
          <pre class="diff">${esc(refDiff || "(unavailable)")}</pre></div>
      </div></details>`;
    return `<div class="border-t border-base-300 pt-3 mt-2">
      <div class="flex flex-wrap gap-x-5 gap-y-1 text-sm opacity-80">
        <span>episode <b>${r.episode ?? 1}</b></span>
        <span>score <b>${r.score.final.toFixed(3)}</b> / ${taskMax(task).toFixed(1)}
          <span class="opacity-60">(base ${r.score.base.toFixed(3)} − penalty ${r.score.penalty.toFixed(3)})</span></span>
        <span>cost <b>$${(r.usage?.cost ?? 0).toFixed(2)}</b></span>
        <span>duration <b>${Math.round((r.duration ?? 0)/1000)}s</b></span>
      </div>${crits}${diffs}</div>`;
  }).join("");
  $("detail-card").scrollIntoView({ behavior: "smooth" });
};

window.toggleRat = (i, si, ji) => {
  const el = $(`rat-${i}-${si}-${ji}`);
  el.style.display = el.style.display === "none" ? "block" : "none";
};

// ---- spend ----
async function refreshSpend() {
  try {
    const { usage } = await api("/api/spend");
    $("spend").textContent = usage != null ? `key usage: $${usage.toFixed(2)}` : "";
  } catch {}
}

// ---- boot ----
initLauncher();
refreshResults(); refreshRuns(); refreshSpend();
setInterval(refreshResults, 10000);
setInterval(refreshRuns, 5000);
setInterval(refreshSpend, 30000);
</script>
</body>
</html>
